<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Heart Teks ❤️</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #08080c;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .heart-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-text {
            position: absolute;
            font-size: 8px; /* Ukuran sedikit diperkecil karena teksnya ditumpuk agar tidak berantakan */
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            color: #ffb3c1;
            text-shadow: 0 0 8px rgba(255, 75, 110, 0.8), 0 0 15px rgba(255, 75, 110, 0.4);
            text-align: center;
            line-height: 1.2;
            animation: waveGlow 3s ease-in-out infinite;
        }

        /* Animasi mengalir memutar dengan posisi teks dikunci tetap lurus (tanpa rotate) */
        @keyframes waveGlow {
            0%, 100% {
                opacity: 0.15;
                transform: translate(var(--x), var(--y)) scale(0.9);
                filter: blur(0.5px);
            }
            50% {
                opacity: 1;
                transform: translate(var(--x), var(--y)) scale(1.05);
                color: #ffffff;
                filter: blur(0px);
                text-shadow: 0 0 15px rgba(255, 75, 110, 1), 0 0 25px rgba(255, 75, 110, 0.6);
            }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>

    <script>
        const heartContainer = document.getElementById('heart');
        const totalTexts = 20; // Jumlah titik koordinat hati
        
        for (let i = 0; i < totalTexts; i++) {
            const angle = (i / totalTexts) * Math.PI * 2;
            
            // Rumus matematika kurva hati
            const x = 16 * Math.pow(Math.sin(angle), 3);
            const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
            
            // Skala jarak agar pas di HP
            const scaleX = 9;
            const scaleY = 9;

            const span = document.createElement('div');
            span.className = 'heart-text';
            
            // DI SINI TRIKNYA: Teks dibuat bertumpuk 2 baris ke bawah (<br> artinya enter/baris baru)
            span.innerHTML = 'i love you<br>i love you';
            
            // Atur posisi koordinat
            span.style.setProperty('--x', `${x * scaleX}px`);
            span.style.setProperty('--y', `${y * scaleY}px`);
            
            // Efek delay mengalir memutar berurutan
            span.style.animationDelay = `${(i / totalTexts) * 3}s`;
            
            heartContainer.appendChild(span);
        }
    </script>

</body>
</html>
