<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0b0c10;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Ukuran box kita perbesar agar tidak menciut di HP */
        .heart-container {
            width: 100%;
            max-width: 360px;
            padding: 10px;
            text-align: center;
        }

        .line {
            display: block;
            margin: 4px 0;
            white-space: nowrap;
        }

        /* Ukuran teks diganti ke rem agar stabil di browser apa pun */
        .line span {
            display: inline-block;
            font-size: 0.7rem; 
            font-weight: 800;
            text-transform: uppercase;
            margin: 0 2px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseFade 3s ease-in-out infinite;
        }

        /* Pengaturan jeda kedap-kedip bergantian */
        .line span:nth-child(odd) {
            animation-delay: 0s;
        }
        .line span:nth-child(even) {
            animation-delay: 1.5s;
        }

        /* Kita ubah animasinya: dari redup (0.3) ke terang benderang (1) */
        @keyframes pulseFade {
            0%, 100% {
                opacity: 0.3;
                transform: scale(0.98);
            }
            50% {
                opacity: 1;
                transform: scale(1.02);
            }
        }
    </style>
</head>
<body>

    <div class="heart-container">
        <div class="line">
            <span>i love you</span><span>i love you</span>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <span>i love you</span><span>i love you</span>
        </div>
        <div class="line">
            <span>i love you</span><span>i love you</span><span>i love you</span><span>i love you</span><span>i love you</span>
        </div>
        <div class="line">
            <span>i love you</span><span>i love you</span><span>i love you</span><span>i love you</span><span>i love you</span>
        </div>
        <div class="line">
            <span>i love you</span><span>i love you</span><span>i love you</span><span>i love you</span>
        </div>
        <div class="line">
            <span>i love you</span><span>i love you</span><span>i love you</span>
        </div>
        <div class="line">
            <span>i love you</span><span>i love you</span>
        </div>
        <div class="line">
            <span>i love you</span>
        </div>
    </div>

</body>
</html>
