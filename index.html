<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Love ❤️</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0c0c11;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* Wadah Utama (kita perbesar sedikit tingginya) */
        .heart-container {
            position: relative;
            width: 300px;
            height: 350px; 
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.9);
        }

        /* Pengaturan Teks Mengalir */
        .heart-text {
            position: absolute;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
            color: #ffb3c1;
            /* Efek cahaya neon pink estetik */
            text-shadow: 0 0 10px rgba(255, 75, 110, 0.9), 0 0 20px rgba(255, 75, 110, 0.5);
            transform-origin: center;
            animation: glowPulse 2.5s ease-in-out infinite alternate;
        }

        /* Variasi delay animasi biar muncul-hilangnya sinematik */
        .heart-text:nth-child(3n) { animation-delay: 0.3s; }
        .heart-text:nth-child(3n+1) { animation-delay: 0.6s; }
        .heart-text:nth-child(3n+2) { animation-delay: 0.9s; }

        /* Efek Kedap-kedip Neon Pink */
        @keyframes glowPulse {
            0% {
                opacity: 0.3;
                filter: drop-shadow(0 0 2px rgba(255, 75, 110, 0.6));
                transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0.98);
            }
            100% {
                opacity: 1;
                filter: drop-shadow(0 0 15px rgba(255, 75, 110, 1));
                transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1.03);
                color: #ffffff;
            }
        }
    </style>
</head>
<body>

    <div class="heart-container">
        <div class="heart-text" style="--x: -45px; --y: -95px; --r: -35deg;">i love you</div>
        <div class="heart-text" style="--x: -85px; --y: -75px; --r: -15deg;">i love you</div>
        <div class="heart-text" style="--x: -110px; --y: -40px; --r: 25deg;">i love you</div>
        <div class="heart-text" style="--x: -110px; --y: 10px; --r: 65deg;">i love you</div>
        
        <div class="heart-text" style="--x: -95px; --y: 60px; --r: 80deg;">i love you</div>
        <div class="heart-text" style="--x: -70px; --y: 110px; --r: 70deg;">i love you</div>
        <div class="heart-text" style="--x: -40px; --y: 150px; --r: 60deg;">i love you</div>

        <div class="heart-text" style="--x: 0px; --y: 175px; --r: 0deg;">❤️</div>

        <div class="heart-text" style="--x: 40px; --y: 150px; --r: -60deg;">i love you</div>
        <div class="heart-text" style="--x: 70px; --y: 110px; --r: -70deg;">i love you</div>
        <div class="heart-text" style="--x: 95px; --y: 60px; --r: -80deg;">i love you</div>

        <div class="heart-text" style="--x: 110px; --y: 10px; --r: -65deg;">i love you</div>
        <div class="heart-text" style="--x: 110px; --y: -40px; --r: -25deg;">i love you</div>
        <div class="heart-text" style="--x: 85px; --y: -75px; --r: 15deg;">i love you</div>
        <div class="heart-text" style="--x: 45px; --y: -95px; --r: 35deg;">i love you</div>

        <div class="heart-text" style="--x: 15px; --y: -70px; --r: 65deg;">i love you</div>
        <div class="heart-text" style="--x: 0px; --y: -50px; --r: 0deg;">i love you</div>
        <div class="heart-text" style="--x: -15px; --y: -70px; --r: -65deg;">i love you</div>
    </div>

</body>
</html>
